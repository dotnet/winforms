trigger:
  batch: true
  branches:
    include:
      - main
      - release/*

pr: none

parameters:
- name: PublishWindowsCorePackage
  type: boolean
  default: false
  displayName: 'Publish Microsoft.Private.Windows.Core NuGet package'

variables:
  - name: _PublishUsingPipelines
    value: false
  - name: EnableLoc
    value: ${{ contains(variables['Build.SourceBranch'], 'main') }}
  - name: enableSourceIndex
    value: ${{ contains(variables['Build.SourceBranch'], 'main') }}
  - template: /eng/common/templates-official/variables/pool-providers.yml@self

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      createAdoIssuesForJustificationsForDisablement: false
      sourceAnalysisPool:
        name: $(DncEngInternalBuildPool)
        image: 1es-windows-2022
        os: windows
    stages:
    - stage: build
      displayName: Build
      jobs:
      - template: /eng/common/templates-official/jobs/jobs.yml@self
        parameters:
          enablePublishBuildArtifacts: true
          enablePublishBuildAssets: false
          enablePublishTestResults: false
          publishAssetsImmediately: true
          isAssetlessBuild: true
          enableTelemetry: true

      - ${{ if eq(variables.enableSourceIndex, 'true') }}:
        - template: /eng/common/templates-official/job/source-index-stage1.yml@self
          parameters:
            sourceIndexBuildCommand: eng\CIBuild.cmd -restore -build -configuration Release /p:Platform=x64 /p:TargetArchitecture=x64 /bl:msbuild.binlog
            binlogPath: msbuild.binlog
            pool:
              name: $(DncEngInternalBuildPool)
              demands: ImageOverride -equals windows.vs2026preview.scout.amd64

      - ${{ if eq(variables['EnableLoc'], 'true') }}:
        - template: /eng/common/templates-official/job/onelocbuild.yml@self
          parameters:
            MirrorRepo: winforms
            UseCheckedInLocProjectJson: true
            LclSource: lclFilesfromPackage
            LclPackageId: 'LCL-JUNO-PROD-WINFORMS'

      # Publish Microsoft.Private.Windows.Core NuGet package (manual trigger only)
      - ${{ if and(eq(parameters.PublishWindowsCorePackage, true), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')) }}:
        - job: PublishWindowsCorePackage
          displayName: 'Build and Publish Microsoft.Private.Windows.Core'
          pool:
            name: $(DncEngInternalBuildPool)
            image: windows.vs2026preview.scout.amd64
            os: windows
          templateContext:
            outputs:
            - output: nuget
              displayName: 'Publish Microsoft.Private.Windows.Core'
              condition: succeeded()
              packageParentPath: '$(Build.SourcesDirectory)\artifacts\packages\Release'
              packagesToPush: '$(Build.SourcesDirectory)\artifacts\packages\Release\NonShipping\Microsoft.Private.Windows.Core.*.nupkg'
              allowPackageConflicts: true
              nuGetFeedType: external
              publishFeedCredentials: 'azure-public/vs-impl'
          steps:
          - template: /eng/common/templates-official/steps/enable-internal-sources.yml
          - template: /eng/common/templates-official/steps/enable-internal-runtimes.yml
          - task: NuGetAuthenticate@1
            inputs:
              nuGetServiceConnections: azure-public/vs-impl
          - script: eng\CIBuild.cmd
              -restore
              -build
              -pack
              -configuration Release
              /p:Platform=x64
              /p:TargetArchitecture=x64
              /bl:$(Build.SourcesDirectory)\artifacts\log\Release\PackWindowsCore.binlog
            displayName: 'Build, Pack and Publish Microsoft.Private.Windows.Core'
