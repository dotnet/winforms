name: Build and Test

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
      - .github/workflows/build-test.yml
      - WinformsLegacy.sln
      - Directory.Build.props
      - Directory.Build.targets
      - Directory.Packages.props
      - global.json
      - NuGet.config
      - dotnet.config
      - eng/**
      - src/**
      
  pull_request:
    branches: [ master ]
    paths:
      - .github/workflows/build-test.yml
      - WinformsLegacy.sln
      - Directory.Build.props
      - Directory.Build.targets
      - Directory.Packages.props
      - global.json
      - NuGet.config
      - dotnet.config
      - eng/**
      - src/**
  workflow_dispatch:

jobs:
  build:
    name: Build - Debug

    runs-on: windows-latest
    timeout-minutes: 30
    env:
      MSBUILDDISABLENODEREUSE: 1
      UseSharedCompilation: false

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Ensure clean build servers
      run: dotnet build-server shutdown

    - name: Install dependencies
      run: dotnet restore WinformsLegacy.sln

    - name: Build
      run: dotnet build WinformsLegacy.sln --configuration Debug --no-restore

    - name: Test
      run: >
        dotnet test
        src/System.Windows.Forms.Legacy/System.Windows.Forms.Legacy.Tests/System.Windows.Forms.Legacy.Tests.csproj
        --configuration Debug
        --no-restore
        --no-build
        --logger trx
        --results-directory TestResults

    - name: Shutdown build servers
      if: always()
      run: dotnet build-server shutdown

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults
        if-no-files-found: warn
